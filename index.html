<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Resource Grid</title>
  <style>
    body { font-family: Arial, sans-serif; }
    .resource-grid { display: flex; gap: 20px; }
    .resource-col { width: 100%; }
    .resource-card { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; border-radius: 6px; }
    .cat-title { margin-bottom: 15px; }
  </style>
</head>
<body>

<div class="resource-grid">
  <div class="resource-col">
    <h2 class="cat-title local">Local & County Data</h2>

    <div class="resource-card local">
      <h3><a href="https://www.brazoriacountytx.gov/departments/engineering/gis" target="_blank">Brazoria County</a></h3>
      <p>Data and Applications for Brazoria County.</p>
    </div>

    <div class="resource-card local">
      <h3><a href="https://cohgis-mycity.opendata.arcgis.com/" target="_blank">City of Houston</a></h3>
      <p>City of Houston's Data Hub.</p>
    </div>

    <div class="resource-card local">
      <h3><a href="https://www.fortbendcountytx.gov/government/departments/county-services/engineering/gis-data" target="_blank">Fort Bend County</a></h3>
      <p>Data and Maps for Fort Bend County.</p>
    </div>

    <div class="resource-card local">
      <h3><a href="https://geo-harriscounty.opendata.arcgis.com/" target="_blank">Harris County</a></h3>
      <p>Harris County open data and applications.</p>
    </div>

    <div class="resource-card local">
      <h3><a href="https://data-moco.opendata.arcgis.com/" target="_blank">Montgomery County</a></h3>
      <p>Data for Montgomery County.</p>
    </div>

  </div>
</div>

</body>
</html>
